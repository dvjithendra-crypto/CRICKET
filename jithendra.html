<!DOCTYPE html>
<html>
<head>
    <title>Cricket Page</title>
    <style>
        body {
            font-family: Arial;
            background-color: #e6f2ff;
            text-align: center;
        }
        h1 {
            color: green;
        }
        .card {
            background: white;
            padding: 15px;
            margin: 20px auto;
            width: 300px;
            border-radius: 10px;
            box-shadow: 0 0 10px gray;
        }
    </style>
</head>
<body>

    <h1>🏏 Cricket Info</h1>

    <div class="card">
        <h2>Popular Players</h2>
        <p>Virat Kohli</p>
        <p>MS Dhoni</p>
        <p>Sachin Tendulkar</p>
    </div>

    <div class="card">
        <h2>Top Teams</h2>
        <p>India</p>
        <p>Australia</p>
        <p>England</p>
    </div>

    <div class="card">
        <h2>Fun Fact</h2>
        <p>Cricket is one of the most popular sports in the world!</p>
    </div>

</body>
</html>
